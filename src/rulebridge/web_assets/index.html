<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RuleBridge Web</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-dark">
<div class="shell">
  <header class="topnav">
    <div class="brandbox"><div class="logo">🌉</div><div><div class="brand">RuleBridge</div><div class="tagline">AI Agent 配置桥接控制台</div></div></div>
    <nav class="toplinks">
      <a class="nav-chip" href="#dashboard">Dashboard</a>
      <a class="nav-chip" href="#operations">Operations</a>
      <a class="nav-chip" href="#resources">Resources</a>
      <a class="nav-chip" href="#generated">Generated</a>
      <a class="nav-chip" href="#diagnostics">Diagnostics</a>
      <a class="nav-chip" href="#packs">Packs</a>
      <a class="nav-chip" href="#results">Results</a>
    </nav>
    <div class="topstats" id="topstats"></div>
  </header>
  <div class="workspace">
    <aside class="left-panel">
      <section class="panel-section">
        <h2>Project Settings</h2>
        <label>Project Root <input type="text" id="rootInput"></label>
        <label>Target <select id="targetSelect"><option value="">all targets</option></select></label>
        <label class="check"><input type="checkbox" id="forceInput"> force overwrite</label>
        <label class="check"><input type="checkbox" id="insertInput"> insert managed block</label>
      </section>
      <section id="operations" class="panel-section">
        <h2>Operations</h2>
        <p class="muted">Safe Checks</p>
        <div class="btn-row"><button data-action="inspect" class="secondary">Inspect</button><button data-action="validate">Validate</button><button data-action="doctor">Doctor</button></div>
        <p class="muted">Preview</p>
        <div class="btn-row"><button data-action="diff">Preview Diff</button><button data-action="dry-run" class="warn">Dry Run Sync</button></div>
        <p class="muted">Write</p>
        <button data-action="sync" class="danger">Sync</button>
      </section>
      <section class="panel-section"><h2>Monitor</h2><div class="monitor" id="monitor"></div></section>
    </aside>
    <main class="main-grid">
      <section id="dashboard" class="card"><h2>Dashboard</h2><div class="metrics" id="dashboardMetrics"></div></section>
      <section id="resources" class="card"><h2>Resources</h2><div id="resourcesBody"></div></section>
      <section id="generated" class="card half"><h2>Generated Files</h2><div id="generatedBody"></div></section>
      <section id="diagnostics" class="card half"><h2>Diagnostics</h2><div id="diagnosticsBody"></div></section>
      <section id="packs" class="card half"><h2>Packs</h2><div id="packsBody"></div></section>
      <section id="results" class="card"><h2>Results</h2><h3>Write Results</h3><div id="writeResultsBody"></div><h3>Diff Preview</h3><div id="diffBody"></div></section>
    </main>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
